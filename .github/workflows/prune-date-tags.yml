name: Prune Old Date Tags and Releases

on:
  schedule:
    # 每周日凌晨0点自动运行（UTC时间）
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      keep_days:
        description: '保留最近多少天的 Tag（默认30）'
        required: false
        default: '30'
      dry_run:
        description: '是否只预览不删除（true/false）'
        required: false
        default: 'false'

jobs:
  prune:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 必须授予写入权限才能删除 Tag 和 Release

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 必须拉取所有 tag

      - name: Calculate cutoff date
        id: dates
        run: |
          KEEP_DAYS="${{ github.event.inputs.keep_days || '30' }}"
          CUTOFF=$(date -d "$KEEP_DAYS days ago" +%Y-%m-%d)
          echo "cutoff=$CUTOFF" >> "$GITHUB_OUTPUT"

      - name: Delete old releases and tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
        run: |
          set -e
          CUTOFF="${{ steps.dates.outputs.cutoff }}"

          # 遍历所有符合 YYYY-MM-DD 格式的 tag
          git tag | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' | while read -r tag; do
            if [[ "$tag" < "$CUTOFF" ]]; then
              echo "Processing tag: $tag"

              # 1. 查找与该 tag 关联的 Release（如果有）
              RELEASE_ID=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/releases/tags/$tag" | jq -r '.id')

              if [[ "$RELEASE_ID" != "null" && -n "$RELEASE_ID" ]]; then
                echo "  Found Release ID: $RELEASE_ID"
                if [ "$DRY_RUN" != "true" ]; then
                  echo "  Deleting Release..."
                  curl -X DELETE -H "Authorization: Bearer $GITHUB_TOKEN" \
                    "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
                else
                  echo "  [DRY-RUN] Would delete Release ID: $RELEASE_ID"
                fi
              else
                echo "  No associated Release found."
              fi

              # 2. 删除本地和远程的 tag
              if [ "$DRY_RUN" != "true" ]; then
                echo "  Deleting local tag: $tag"
                git tag -d "$tag"
                echo "  Deleting remote tag: $tag"
                git push origin ":refs/tags/$tag"
              else
                echo "  [DRY-RUN] Would delete tag: $tag"
              fi
            fi
          done

          if [ "$DRY_RUN" == "true" ]; then
            echo ""
            echo "⚠️ 当前为预览模式（dry_run=true），未执行任何删除操作。"
            echo "确认无误后，请在手动触发时将 dry_run 改为 false 再运行一次。"
          fi
