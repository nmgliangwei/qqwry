name: Prune Old Date Tags and Releases

on:
  schedule:
    # 每周日凌晨0点自动运行（UTC时间）
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      keep_days:
        description: '保留最近多少天的 Tag（默认30）'
        required: false
        default: '30'
      dry_run:
        description: '是否只预览不删除（true/false）'
        required: false
        default: 'false'

jobs:
  prune:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 必须授予写入权限才能删除 Tag 和 Release

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 必须拉取所有 tag

      - name: Calculate cutoff date
        id: dates
        run: |
          KEEP_DAYS="${{ github.event.inputs.keep_days || '30' }}"
          CUTOFF=$(date -d "$KEEP_DAYS days ago" +%Y-%m-%d)
          echo "cutoff=$CUTOFF" >> "$GITHUB_OUTPUT"

      - name: Delete old releases and tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || github.event.inputs.dry_run || 'true' }}
        run: |
          set -e
          CUTOFF="${{ steps.dates.outputs.cutoff }}"

          # 遍历所有符合 YYYY-MM-DD 格式的 tag
          git tag | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' | while read -r tag; do
            if [[ "$tag" < "$CUTOFF" ]]; then
              echo "Processing tag: $tag"

              # 1. 检查是否存在关联的 Release
              if gh release view "$tag" >/dev/null 2>&1; then
                HAS_RELEASE=1
                echo "  Found associated Release."
              else
                HAS_RELEASE=0
                echo "  No associated Release found."
              fi

              if [ "$DRY_RUN" == "true" ]; then
                echo "  [DRY-RUN] Would delete tag$([ $HAS_RELEASE -eq 1 ] && echo ' and Release'): $tag"
                continue
              fi

              # 2. 优先用 gh release delete --cleanup-tag 一次性删 Release + tag
              #    避免先删 Release / 后删 tag 中间失败导致 Release 变 draft
              if [ "$HAS_RELEASE" -eq 1 ]; then
                echo "  Deleting Release + tag via gh..."
                if ! gh release delete "$tag" --yes --cleanup-tag; then
                  echo "  ❌ Failed to delete Release for $tag — skipping tag deletion to avoid orphan draft."
                  exit 1
                fi
              else
                # 没有 Release，直接删 tag
                echo "  Deleting local tag: $tag"
                git tag -d "$tag"
                echo "  Deleting remote tag: $tag"
                git push origin ":refs/tags/$tag"
              fi
            fi
          done

          # 3. 清理所有「日期格式」的草稿 Release（历史遗留的孤儿 draft）
          #    草稿 Release 没有真正发布，没有关联 tag，直接按名字删即可。
          echo ""
          echo "==== Sweeping orphan draft releases (YYYY-MM-DD) ===="
          gh release list --limit 1000 --json tagName,isDraft \
            --jq '.[] | select(.isDraft) | select(.tagName | test("^[0-9]{4}-[0-9]{2}-[0-9]{2}$")) | .tagName' \
            | while read -r draft_tag; do
                if [ "$DRY_RUN" == "true" ]; then
                  echo "  [DRY-RUN] Would delete draft Release: $draft_tag"
                else
                  echo "  Deleting draft Release: $draft_tag"
                  gh release delete "$draft_tag" --yes || echo "  ⚠️  Failed to delete draft $draft_tag (continuing)"
                fi
              done

          if [ "$DRY_RUN" == "true" ]; then
            echo ""
            echo "⚠️ 当前为预览模式（dry_run=true），未执行任何删除操作。"
            echo "确认无误后，请在手动触发时将 dry_run 改为 false 再运行一次。"
          fi
